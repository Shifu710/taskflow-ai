services:
  - type: web
    name: taskflow-api
    runtime: docker
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: ./services/api
    healthCheckPath: /health
    envVars:
      - key: TASKFLOW_USE_CELERY
        value: "false"
      - key: AI_PROVIDER
        value: demo-local
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: TASKFLOW_JWT_SECRET
        generateValue: true
      - key: TASKFLOW_WEBHOOK_SECRET
        generateValue: true
      - key: FRONTEND_ORIGINS
        value: https://taskflow-ai-seven-eosin.vercel.app

databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow
    plan: free
